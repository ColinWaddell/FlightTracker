---
name: Feature request
description: Suggest a new feature or improvement for FlightTracker
title: "[FEATURE] "
labels: enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please read the
        [contributing guide](https://github.com/ColinWaddell/FlightTracker/blob/main/CONTRIBUTING.md)
        to understand how feature requests are triaged and what to expect.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your feature request related to a problem? Describe what's currently difficult or impossible to do.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the solution you'd like. Screenshots, mockups, or rough sketches are all welcome.
    validations:
      required: true

