<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}" />
  <title>FlightTracker - Clear Cache</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
<div class="container-fluid py-4" style="max-width:800px">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div class="d-flex align-items-center">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="FlightTracker" height="32" class="me-2" />
      <h1 class="fs-4 fw-semibold mb-0">Clear Cache</h1>
    </div>
    <div class="d-flex gap-2">
      <a href="{{ url_for('settings') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-gear me-1"></i>Settings
      </a>
      <a href="/logout" class="btn btn-sm btn-outline-danger">
        <i class="bi bi-box-arrow-right me-1"></i>Sign out
      </a>
    </div>
  </div>

  {% if error %}
  <div class="alert alert-danger mb-3">
    <strong>Cache clear error:</strong> {{ error }}
  </div>
  {% endif %}

  <div class="card mb-3 p-4">
    <h2 class="fs-5 fw-semibold mb-3"><i class="bi bi-trash3 me-2"></i>Clear cached files</h2>
    <p class="mb-3 text-muted">
      This will remove the route and TLE cache JSON files used by FlightTracker.
      The application will restart automatically after cache clearing.
    </p>

    <form method="post" action="/cache-clear/apply" id="clear-cache-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <button type="submit" class="btn btn-danger" id="clear-cache-btn">
        <i class="bi bi-trash3 me-1"></i>Clear Cache and Restart
      </button>
    </form>
  </div>
</div>

<script>
  const form = document.getElementById('clear-cache-form');
  if (form) {
    form.addEventListener('submit', function () {
      const btn = document.getElementById('clear-cache-btn');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Clearing...';
      }
    });
  }
</script>
</body>
</html>
