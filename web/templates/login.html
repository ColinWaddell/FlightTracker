<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FlightTracker – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>body { background: #f8f9fa; }</style>
</head>
<body>
<div class="container py-5" style="max-width:360px">
  <div class="text-center mb-4">
    <span class="fs-2">✈</span>
    <h1 class="fs-4 fw-semibold mt-1">FlightTracker</h1>
    <p class="text-muted small">Enter the password to access settings</p>
  </div>

  <div class="card border-0 shadow-sm p-4">
    <form method="post" action="{{ url_for('login', next=request.args.get('next', '')) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      {% if error %}
      <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}

      <div class="mb-3">
        <label for="password" class="form-label small fw-semibold">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               autofocus autocomplete="current-password" />
        {% if using_default_password %}
        <div class="form-text text-muted">Default password is <code>flighttracker</code></div>
        {% endif %}
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Sign in</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
